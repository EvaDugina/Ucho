services:
  bot:
    build: .
    container_name: psycho-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Non-secret runtime route. Overrides stale model values in .env; secrets
      # like OPENAI_API_KEY still live only in .env.
      LLM_MODEL_DEFAULT: qwen/qwen3-235b-a22b-2507
      LLM_MODEL_FALLBACKS: deepseek/deepseek-v4-flash
    volumes:
      # Путь к папке вольта на хосте берётся из VAULT_HOST_PATH в .env.
      # Без этой переменной compose упадёт с понятной ошибкой — это сознательно,
      # чтобы путь не дублировался в двух местах.
      - "${VAULT_HOST_PATH:?set VAULT_HOST_PATH in .env (see .env.example)}:/vault"
