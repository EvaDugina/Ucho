services:
  bot:
    build:
      context: .
      args:
        # Public cache of the Docker Official Image. This avoids Docker Hub's
        # anonymous pull limit on fresh VPS deploys; override after docker login
        # with PYTHON_BASE_IMAGE=python:3.12-slim if needed.
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-mirror.gcr.io/library/python:3.12-slim}
    container_name: psycho-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Non-secret AITunnel fallback route. If OPENROUTER_API_KEY is set in .env,
      # bot/config.py prefers OpenRouter and ignores these AITunnel model defaults.
      AITUNNEL_BASE_URL: https://api.aitunnel.ru/v1
      LLM_MODEL_DEFAULT: qwen3-235b-a22b-2507
      LLM_MODEL_FALLBACKS: deepseek-v4-flash
      LLM_MODEL_FAST: deepseek-v4-flash
      CONTAINER_LOG_DIR: ${CONTAINER_LOG_DIR:-/app/.logs}
      CONTAINER_LOG_MAX_BYTES: ${CONTAINER_LOG_MAX_BYTES:-10485760}
      CONTAINER_LOG_BACKUP_COUNT: ${CONTAINER_LOG_BACKUP_COUNT:-5}
    volumes:
      - ./.logs:/app/.logs
      # Путь к папке вольта на хосте берётся из VAULT_HOST_PATH в .env.
      # Без этой переменной compose упадёт с понятной ошибкой — это сознательно,
      # чтобы путь не дублировался в двух местах.
      - "${VAULT_HOST_PATH:?set VAULT_HOST_PATH in .env (see .env.example)}:/vault"
